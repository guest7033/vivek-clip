<!DOCTYPE html>
<html>
<head>
  <title>Vivek Clip Pro</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    h2 {
      color: #38bdf8;
    }

    textarea {
      width: 90%;
      height: 200px;
      font-size: 16px;
      background: #1e293b;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .save {
      background: #22c55e;
      color: black;
    }

    .copy {
      background: #38bdf8;
      color: black;
    }
  </style>
</head>
<body>

<h2>🚀 Vivek Private Clip PRO</h2>

<textarea id="text" placeholder="Paste text here..."></textarea><br>
  <br>
<input type="number" id="expiry" placeholder="Expiry in minutes (e.g. 5)">
  <input type="file" id="file"><br>
<button onclick="uploadFile()">Upload File</button>
<a id="fileLink" target="_blank"></a>

<button class="save" onclick="save()">Save</button>
<button class="copy" onclick="copyText()">Copy</button>
 
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyABEbSmJY1XNq1KW8ZiDWaRUIqF0aGmY5w",
  authDomain: "vivek-clip.firebaseapp.com",
  databaseURL: "https://vivek-clip-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vivek-clip"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const path = window.location.pathname.replace("/vivek-clip/", "") || "default";

// SAVE
function save() {
  const val = document.getElementById("text").value;
  const expiryMinutes = document.getElementById("expiry").value;

  const expiryTime = expiryMinutes
    ? Date.now() + expiryMinutes * 60000
    : Date.now() + 300000; // default 5 min

 db.ref(path).set({
  text: val,
  expiry: expiryTime,
  fileData: null // 🔥 removes old file
});

  alert("Saved with expiry!");
}

// LOAD
db.ref(path).on("value", (snap) => {
  const data = snap.val();
  if (!data) return;

  const now = Date.now();

if (data.fileData) {
  document.getElementById("fileLink").innerText = "Download File";
  document.getElementById("fileLink").href = data.fileData;
} else {
  document.getElementById("fileLink").innerText = "";
  document.getElementById("fileLink").href = "";
}

    if (data.fileData) {
      document.getElementById("fileLink").innerText = "Download File";
      document.getElementById("fileLink").href = data.fileData;
    }
  }
});

// COPY
function copyText() {
  const text = document.getElementById("text");
  navigator.clipboard.writeText(text.value);
  alert("Copied!");
}

// UPLOAD
function uploadFile() {
  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Select file first!");
    return;
  }

  const reader = new FileReader();

  reader.onload = function (e) {
    const base64 = e.target.result;

    db.ref(path).update({
      fileData: base64
    });

    document.getElementById("fileLink").innerText = "Download File";
    document.getElementById("fileLink").href = base64;

    alert("File stored!");
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
