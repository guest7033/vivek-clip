<!DOCTYPE html>
<html>
<head>
  <title>Vivek Clip Pro</title>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    h2 {
      color: #38bdf8;
    }

    textarea {
      width: 90%;
      height: 200px;
      font-size: 16px;
      background: #1e293b;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .save {
      background: #22c55e;
      color: black;
    }

    .copy {
      background: #38bdf8;
      color: black;
    }
  </style>
</head>
<body>

<h2>🚀 Vivek Private Clip PRO</h2>

<textarea id="text" placeholder="Paste text here..."></textarea><br>
  <input type="file" id="file"><br>
<button onclick="uploadFile()">Upload File</button>
<a id="fileLink" target="_blank"></a>

<button class="save" onclick="save()">Save</button>
<button class="copy" onclick="copyText()">Copy</button>
 
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyABEbSmJY1XNq1KW8ZiDWaRUIqF0aGmY5w",
  authDomain: "vivek-clip.firebaseapp.com",
  databaseURL: "https://vivek-clip-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vivek-clip"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 path fix for GitHub Pages
const path = window.location.pathname.replace("/vivek-clip/", "") || "default";

// SAVE + auto delete
function save() {
  const val = document.getElementById("text").value;

  db.ref(path).set({
    text: val,
    time: Date.now()
  });

  alert("Saved!");
}

// LOAD + auto delete check
db.ref(path).on("value", (snap) => {
  const data = snap.val();

  if (!data) return;

  const now = Date.now();

  // ⏳ delete after 5 min (300000 ms)
  if (now - data.time > 300000) {
    db.ref(path).remove();
    document.getElementById("text").value = "";
 } else {
  document.getElementById("text").value = data.text || "";

  if (data.fileURL) {
    document.getElementById("fileLink").innerText = "Open File";
    document.getElementById("fileLink").href = data.fileURL;
  }
}
  });
// COPY button
function copyText() {
  const text = document.getElementById("text");
  navigator.clipboard.writeText(text.value);
  alert("Copied!");
}
  async function uploadFile() {
    alert("Button clicked");

  const file = document.getElementById("file").files[0];

  if (!file) {
    alert("Select file first!");
    return;
  }
  }

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("https://file.io/?expires=1d", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if (data.success) {
    const link = data.link;

    db.ref(path).update({
      fileURL: link
    });

    document.getElementById("fileLink").innerText = "Open File";
    document.getElementById("fileLink").href = link;

    alert("File uploaded!");
  } else {
    alert("Upload failed");
  }
}
</script>

</body>
</html>
